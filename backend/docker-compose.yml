services:
  postgres:
    image: postgres:17-alpine
    container_name: temporal_demo_postgres
    environment:
      POSTGRES_DB: temporal_demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.29.4
    container_name: temporal_demo_server
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_DB: temporal
      POSTGRES_SEEDS: "postgres"
    ports:
      - "7233:7233"
      - "7234:7234"
      - "7235:7235"
      - "7239:7239"
      - "6933:6933"
      - "6934:6934"
      - "6935:6935"
      - "6939:6939"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 7233 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s

  temporal-ui:
    image: temporalio/ui:latest
    container_name: temporal_demo_ui
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8080:8080"
    depends_on:
      - temporal

volumes:
  postgres_data:
